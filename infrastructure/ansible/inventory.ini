[vps]
# TODO: replace <VPS_IP> with the Hetzner public IPv4.
# TODO: replace ~/.ssh/your_deploy_key with the path to your deploy SSH private key.
#
# Bootstrap run (fresh VPS, only root exists):
#   ansible-playbook playbook.yml -i inventory.local.ini -e @vars/local.yml \
#     -e ansible_user=root \
#     -e ansible_ssh_private_key_file=~/.ssh/root_key
#
# All subsequent runs use the deploy user created by the base role:
#   ansible-playbook playbook.yml -i inventory.local.ini -e @vars/local.yml
<VPS_IP> ansible_user=deploy ansible_ssh_private_key_file=~/.ssh/your_deploy_key ansible_ssh_common_args='-o IdentitiesOnly=yes'