---
# Main provisioning playbook for the cfxdevkit framework VPS.
#
# Bootstrap (first run against a fresh VPS):
#   ansible-playbook playbook.yml -i inventory.local.ini -e @vars/local.yml \
#     -e ansible_user=root \
#     -e ansible_ssh_private_key_file=~/.ssh/root_key
#
# Subsequent runs:
#   ansible-playbook playbook.yml -i inventory.local.ini -e @vars/local.yml

- name: Provision cfxdevkit framework VPS
  hosts: vps
  become: true

  vars_files:
    - vars/all.yml

  roles:
    - role: base
      tags: [base, security]

    - role: docker
      tags: [docker]

    - role: caddy
      tags: [caddy]

    - role: backups
      tags: [backups]

    - role: monitoring
      tags: [monitoring]

    - role: docs
      tags: [docs]