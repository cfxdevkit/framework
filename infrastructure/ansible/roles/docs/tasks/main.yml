---
- name: Create docs app directory
  file:
    path: /opt/apps/docs
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0755"

- name: Write docs docker-compose.yml
  copy:
    dest: /opt/apps/docs/docker-compose.yml
    owner: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    mode: "0644"
    content: |
      services:
        docs-site:
          image: {{ docs_image }}:{{ docs_image_tag }}
          container_name: cfxdevkit-docs-site
          restart: unless-stopped
          ports:
            - "127.0.0.1:{{ app_ports.docs }}:3100"
          environment:
            NODE_ENV: production
            PORT: "3100"
          security_opt:
            - no-new-privileges:true
          healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:3100"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 15s

- name: Start docs site
  community.docker.docker_compose_v2:
    project_src: /opt/apps/docs
    state: present
    pull: always
  become_user: "{{ deploy_user }}"