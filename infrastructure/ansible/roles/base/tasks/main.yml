---
- name: Set timezone
  community.general.timezone:
    name: "{{ server_timezone }}"

- name: Ensure locale is generated
  locale_gen:
    name: en_US.UTF-8
    state: present

- name: Install base packages
  apt:
    name:
      - apt-listchanges
      - ca-certificates
      - curl
      - fail2ban
      - git
      - gnupg
      - htop
      - logrotate
      - rsync
      - ufw
      - unattended-upgrades
    state: present
    update_cache: true

- name: Create deploy group
  group:
    name: "{{ deploy_group }}"
    state: present

- name: Create deploy user
  user:
    name: "{{ deploy_user }}"
    group: "{{ deploy_group }}"
    shell: /bin/bash
    create_home: true
    state: present

- name: Install deploy user SSH public key
  authorized_key:
    user: "{{ deploy_user }}"
    key: "{{ deploy_pubkey }}"
    state: present
    exclusive: true

- name: Allow deploy user passwordless sudo
  copy:
    dest: /etc/sudoers.d/deploy-nopasswd
    content: "{{ deploy_user }} ALL=(ALL) NOPASSWD: ALL\n"
    mode: "0440"
    validate: "visudo -cf %s"

- name: Harden SSH configuration
  lineinfile:
    path: /etc/ssh/sshd_config
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: "^#?PermitRootLogin", line: "PermitRootLogin no" }
    - { regexp: "^#?PasswordAuthentication", line: "PasswordAuthentication no" }
    - { regexp: "^#?PubkeyAuthentication", line: "PubkeyAuthentication yes" }
    - { regexp: "^#?X11Forwarding", line: "X11Forwarding no" }
    - { regexp: "^#?MaxAuthTries", line: "MaxAuthTries 3" }
    - { regexp: "^#?LoginGraceTime", line: "LoginGraceTime 30" }
    - { regexp: "^#?AllowUsers", line: "AllowUsers {{ deploy_user }}" }
  notify: Restart SSH

- name: Set ufw default policies
  ufw:
    direction: "{{ item.direction }}"
    policy: "{{ item.policy }}"
  loop:
    - { direction: incoming, policy: deny }
    - { direction: outgoing, policy: allow }

- name: Allow SSH
  ufw:
    rule: allow
    port: "22"
    proto: tcp

- name: Allow HTTP
  ufw:
    rule: allow
    port: "80"
    proto: tcp

- name: Allow HTTPS
  ufw:
    rule: allow
    port: "443"
    proto: tcp

- name: Enable ufw
  ufw:
    state: enabled

- name: Write fail2ban jail.local
  copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime  = 3600
      findtime = 600
      maxretry = 5

      [sshd]
      enabled  = true
      port     = ssh
      logpath  = %(sshd_log)s
      backend  = %(sshd_backend)s
    mode: "0644"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  service:
    name: fail2ban
    state: started
    enabled: true

- name: Configure unattended-upgrades
  copy:
    dest: /etc/apt/apt.conf.d/50unattended-upgrades
    content: |
      Unattended-Upgrade::Allowed-Origins {
        "${distro_id}:${distro_codename}-security";
      };
      Unattended-Upgrade::Automatic-Reboot "true";
      Unattended-Upgrade::Automatic-Reboot-Time "03:00";
      Unattended-Upgrade::Remove-Unused-Dependencies "true";
    mode: "0644"

- name: Enable unattended-upgrades periodic timer
  copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
    mode: "0644"