$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'application'
language: 'typescript'

tasks:
  build:
    command: 'tsc -p tsconfig.json'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    outputs:
      - 'dist'
    options:
      mergeArgs: 'replace'
      cache: true

  typecheck:
    command: 'tsc --noEmit -p tsconfig.json'
    inputs:
      - '@group(sources)'
      - '@group(configs)'
    options:
      mergeArgs: 'replace'
      cache: true

  test:
    command: 'echo "no tests"'
    options:
      mergeArgs: 'replace'
      cache: false
