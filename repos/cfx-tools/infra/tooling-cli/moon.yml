$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'tool'
language: 'typescript'

fileGroups:
  sources:
    - 'src/**/*'
    - 'package.json'
    - 'tsconfig*.json'

tasks:
  build:
    script: 'pnpm exec vite build && ../../../../.devcontainer/scripts/install-cdk.sh'
    deps:
      - 'cdk-repo-check:build'
      - 'llm-agents:build'
      - 'pi-agent:build'
      - 'docs-pipeline:build'
    inputs:
      - '@group(sources)'
    outputs:
      - 'dist'
    options:
      mergeArgs: 'replace'
      mergeOutputs: 'replace'
      cache: true

  # ── repo operations (compatibility wrappers) ──────────────────────
  repo-build:
    script: 'cdk repo build --json'
    options:
      mergeArgs: 'replace'
  repo-run:
    script: 'cdk repo run'
    options:
      mergeArgs: 'replace'
  repo-gate:
    script: 'cdk repo gate'
    options:
      mergeArgs: 'replace'
  repo-check:
    script: 'cdk repo check'
    options:
      mergeArgs: 'replace'
  repo-generate:
    script: 'cdk repo generate'
    options:
      mergeArgs: 'replace'
  repo-merge:
    script: 'cdk repo merge'
    options:
      mergeArgs: 'replace'
  repo-review:
    script: 'cdk repo review'
    options:
      mergeArgs: 'replace'
  repo-precommit:
    script: 'cdk repo precommit'
    options:
      mergeArgs: 'replace'
  repo-commit:
    script: 'cdk repo commit'
    options:
      mergeArgs: 'replace'
  repo-units:
    script: 'cdk repo units'
    options:
      mergeArgs: 'replace'

  # ── agent/LLM operations (compatibility wrappers) ─────────────────
  agent-smoke:
    script: 'cdk agent smoke'
    options:
      mergeArgs: 'replace'
  agent-config:
    script: 'cdk agent config'
    options:
      mergeArgs: 'replace'
  agent-status:
    script: 'cdk agent status'
    options:
      mergeArgs: 'replace'
  agent-check:
    script: 'cdk agent check'
    options:
      mergeArgs: 'replace'
  agent-merge:
    script: 'cdk agent merge'
    options:
      mergeArgs: 'replace'
  agent-endpoints:
