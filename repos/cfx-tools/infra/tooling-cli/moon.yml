$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'tool'
language: 'typescript'

fileGroups:
  sources:
    - 'src/**/*'
    - 'package.json'
    - 'tsconfig*.json'

tasks:
  build:
    script: 'pnpm exec vite build && ../../../../.devcontainer/scripts/install-cdk.sh'
    deps:
      - 'cdk-repo-check:build'
      - 'llm-agents:build'
      - 'pi-agent:build'
      - 'docs-pipeline:build'
    inputs:
      - '@group(sources)'
    outputs:
      - 'dist'
    options:
      mergeArgs: 'replace'
      mergeOutputs: 'replace'
      cache: true
