$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'tool'
language: 'typescript'

fileGroups:
  sources:
    - 'src/**/*'
    - 'package.json'
    - 'tsconfig*.json'

tasks:
  build:
    script: 'pnpm exec vite build && ../../../../.devcontainer/scripts/install-cdk.sh'
    deps:
      - 'cdk-repo-check:build'
      - 'llm-agents:build'
      - 'pi-agent:build'
      - 'docs-pipeline:build'
    inputs:
      - '@group(sources)'
    outputs:
      - 'dist'
    options:
      mergeArgs: 'replace'
      mergeOutputs: 'replace'
      cache: true

  # ── repo operations (call underlying packages directly) ───────────
  repo-build:
    script: 'moon run :build --concurrency 3'
    options:
      mergeArgs: 'replace'
  repo-run:
    script: 'moon run --help'
    options:
      mergeArgs: 'replace'
  repo-gate:
    script: 'pnpm run repo-check --list'
    options:
      mergeArgs: 'replace'
  repo-check:
    script: 'pnpm run repo-check'
    options:
      mergeArgs: 'replace'
  repo-generate:
    script: 'pnpm run gen:api'
    options:
      mergeArgs: 'replace'
  repo-merge:
    script: 'pnpm --filter @cfxdevkit/llm-agents agent-merge'
    options:
      mergeArgs: 'replace'
  repo-review:
    script: 'pnpm run agent'
    options:
      mergeArgs: 'replace'
  repo-precommit:
    script: 'pnpm --filter @cfxdevkit/llm-agents deterministic precommit'
    options:
      mergeArgs: 'replace'
  repo-commit:
    script: 'pnpm --filter @cfxdevkit/llm-agents agent-commit'
    options:
      mergeArgs: 'replace'
  repo-units:
    script: 'pnpm run repo-check --units'
    options:
      mergeArgs: 'replace'

  # ── agent/LLM operations (call underlying packages directly) ──────
  agent-smoke:
    script: 'pnpm --filter @cfxdevkit/llm-agents agent-smoke'
    options:
      mergeArgs: 'replace'
  agent-config:
    script: 'pnpm --filter @cfxdevkit/llm-agents agent-config'
    options:
      mergeArgs: 'replace'
  agent-status:
    script: 'pnpm --filter @cfxdevkit/llm-agents agent-status'
    options:
      mergeArgs: 'replace'
  agent-check:
    script: 'pnpm --filter @cfxdevkit/llm-agents agent-check'
    options:
      mergeArgs: 'replace'
  agent-merge:
    script: 'pnpm --filter @cfxdevkit/llm-agents agent-merge'
    options:
      mergeArgs: 'replace'
  agent-endpoints:
    script: 'pnpm --filter @cfxdevkit/llm-agents agent-endpoints'
    options:
      mergeArgs: 'replace'
  agent-modes:
    script: 'pnpm --filter @cfxdevkit/llm-agents agent-modes'
    options:
      mergeArgs: 'replace'
  agent-deterministic:
    script: 'pnpm --filter @cfxdevkit/llm-agents agent-deterministic'
    options:
      mergeArgs: 'replace'
  agent-exploratory:
    script: 'pnpm --filter @cfxdevkit/llm-agents agent-exploratory'
    options:
      mergeArgs: 'replace'
  agent-chat:
    script: 'pnpm run agent'
    options:
      mergeArgs: 'replace'
  agent-commit:
    script: 'pnpm run agent-commit'
    options:
      mergeArgs: 'replace'
  agent-print:
    script: 'pnpm run agent-print'
    options:
      mergeArgs: 'replace'
  agent-rpc:
    script: 'pnpm run agent-rpc'
    options:
      mergeArgs: 'replace'

  # ── deterministic sub-workflows ───────────────────────────────────
  agent-deterministic-models:
    script: 'pnpm --filter @cfxdevkit/llm-agents deterministic models'
    options:
      mergeArgs: 'replace'
  agent-deterministic-validate-models:
    script: 'pnpm --filter @cfxdevkit/llm-agents deterministic validate-models'
    options:
      mergeArgs: 'replace'
  agent-deterministic-precommit:
    script: 'pnpm --filter @cfxdevkit/llm-agents deterministic precommit'
    options:
      mergeArgs: 'replace'
  agent-deterministic-docs-api:
    script: 'pnpm --filter @cfxdevkit/llm-agents deterministic docs-api'
    options:
      mergeArgs: 'replace'
  agent-deterministic-docs-api-probe:
    script: 'pnpm --filter @cfxdevkit/llm-agents deterministic docs-api-probe'
    options:
      mergeArgs: 'replace'
  agent-deterministic-readme-upkeep:
    script: 'pnpm --filter @cfxdevkit/llm-agents deterministic readme-upkeep'
    options:
      mergeArgs: 'replace'
  agent-deterministic-package-pages:
    script: 'pnpm --filter @cfxdevkit/llm-agents deterministic package-pages'
    options:
      mergeArgs: 'replace'
  agent-deterministic-structure-upkeep:
    script: 'pnpm --filter @cfxdevkit/llm-agents deterministic structure-upkeep'
    options:
      mergeArgs: 'replace'
  agent-deterministic-docs-upkeep:
    script: 'pnpm --filter @cfxdevkit/llm-agents deterministic docs-upkeep'
    options:
      mergeArgs: 'replace'

  # ── exploratory sub-workflows ─────────────────────────────────────
  agent-exploratory-all:
    script: 'pnpm --filter @cfxdevkit/llm-agents exploratory all'
    options:
      mergeArgs: 'replace'
  agent-exploratory-actions:
    script: 'pnpm --filter @cfxdevkit/llm-agents exploratory actions'
    options:
      mergeArgs: 'replace'
  agent-exploratory-action:
    script: 'pnpm --filter @cfxdevkit/llm-agents exploratory action'
    options:
      mergeArgs: 'replace'
  agent-exploratory-changeset:
    script: 'pnpm --filter @cfxdevkit/llm-agents exploratory changeset'
    options:
      mergeArgs: 'replace'
  agent-exploratory-ci-cd:
    script: 'pnpm --filter @cfxdevkit/llm-agents exploratory ci-cd'
    options:
      mergeArgs: 'replace'
  agent-exploratory-docs-pipeline:
    script: 'pnpm --filter @cfxdevkit/llm-agents exploratory docs-pipeline'
    options:
      mergeArgs: 'replace'
  agent-exploratory-docs-upkeep:
    script: 'pnpm --filter @cfxdevkit/llm-agents exploratory docs-upkeep'
    options:
      mergeArgs: 'replace'
  agent-exploratory-health:
    script: 'pnpm --filter @cfxdevkit/llm-agents exploratory health'
    options:
      mergeArgs: 'replace'
  agent-exploratory-release:
    script: 'pnpm --filter @cfxdevkit/llm-agents exploratory release'
    options:
      mergeArgs: 'replace'
  agent-exploratory-test-audit:
    script: 'pnpm --filter @cfxdevkit/llm-agents exploratory test-audit'
    options:
      mergeArgs: 'replace'
  agent-exploratory-test-upkeep:
    script: 'pnpm --filter @cfxdevkit/llm-agents exploratory test-upkeep'
    options:
      mergeArgs: 'replace'
  agent-exploratory-validation:
    script: 'pnpm --filter @cfxdevkit/llm-agents exploratory validation'
    options:
      mergeArgs: 'replace'

  # ── docs operations ───────────────────────────────────────────────
  docs-sync:
    script: 'pnpm --filter @cfxdevkit/docs-pipeline cfx-docs-pipeline sync'
    options:
      mergeArgs: 'replace'
  docs-validate:
    script: 'pnpm --filter @cfxdevkit/docs-pipeline cfx-docs-pipeline validate'
    options:
      mergeArgs: 'replace'
  docs-enrich:
    script: 'pnpm --filter @cfxdevkit/docs-pipeline cfx-docs-pipeline enrich'
