$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'application'
language: 'typescript'

dependsOn:
  - 'devnode-server'
  - 'wallet'
  - 'cdk'
  - 'client'
  - 'react'
  - 'theme'
  - 'showcase-ui'

tasks:
  build:
    command: 'pnpm exec next build'
    inputs:
      - 'app/**/*'
      - 'package.json'
      - 'next.config.*'
      - 'tsconfig*.json'
    outputs:
      - '.next'
    options:
      runInCI: false
      mergeArgs: 'replace'
      mergeOutputs: 'replace'

  typecheck:
    options:
      runInCI: false

  test:
    options:
      runInCI: false

  check:
    options:
      runInCI: false

  clean:
    options:
      runInCI: false

  lint:
    command: 'pnpm exec biome check app'
    inputs:
      - 'app/**/*'
      - '/biome.json'
    options:
      runInCI: false
      mergeArgs: 'replace'
      cache: true
