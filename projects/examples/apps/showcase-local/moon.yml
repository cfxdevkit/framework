$schema: 'https://moonrepo.dev/schemas/project.json'

layer: 'application'
language: 'typescript'

tasks:
  build:
    command: 'next build'
    inputs:
      - 'app/**/*'
      - 'package.json'
      - 'next.config.*'
      - 'tsconfig*.json'
    outputs:
      - '.next'
    options:
      runInCI: false

  lint:
    command: 'pnpm exec biome check app'
    inputs:
      - 'app/**/*'
      - '/biome.json'
    options:
      mergeArgs: 'replace'
      cache: true
