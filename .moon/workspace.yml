  - 'repos/cfx-tools/packages/scaffold-cli'
  - 'repos/cfx-tools/packages/cli'
  - 'repos/cfx-tools/packages/vscode-extension'
  - 'projects/examples/packages/showcase-ui'
  - 'projects/examples/apps/showcase-public'
  - 'projects/examples/apps/showcase-local'

vcs:
  client: 'git'
  defaultBranch: 'dev'

pipeline:
  inheritColorsForPipedTasks: true
