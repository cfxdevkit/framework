$schema: 'https://moonrepo.dev/schemas/workspace.json'

# Explicit list — avoids false-positive matches of README.md / STRUCTURE.md
# at tier-root level (those are documentation, not projects).
projects:
  - 'repos/cfx-config/packages/tsconfig'
  - 'repos/cfx-config/packages/biome-config'
  - 'repos/cfx-config/packages/moon-config'
  - 'repos/cfx-meta/packages/arch-rules'
  - 'repos/cfx-core/packages/core'
  - 'repos/cfx-core/packages/protocol'
  - 'repos/cfx-core/packages/executor'
  - 'repos/cfx-core/packages/devnode'
  - 'repos/cfx-core/packages/testing'
  - 'repos/cfx-solidity/packages/abis'
  - 'repos/cfx-solidity/packages/contracts'
  - 'repos/cfx-tools/packages/compiler'
  - 'repos/cfx-tools/packages/codegen-contracts'
  - 'repos/cfx-keys/packages/services'
  - 'repos/cfx-keys/packages/wallet'
  - 'repos/cfx-ui/packages/react'
  - 'repos/cfx-ui/packages/defi-react'
  - 'repos/cfx-ui/packages/theme'
  - 'repos/cfx-ui/packages/ui-core'
  - 'repos/cfx-ui/packages/ui'
  - 'repos/cfx-ui/packages/wallet-connect'
