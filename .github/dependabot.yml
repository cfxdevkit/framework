version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    groups:
      dev-tooling:
        patterns:
          - '@biomejs/biome'
          - '@moonrepo/cli'
          - typescript
          - vite
          - vitest
          - vite-plugin-dts
      wallet-connectors:
        patterns:
          - wagmi
          - '@wagmi/*'
          - '@metamask/*'
          - '@coinbase/*'
          - '@base-org/*'

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
