name: Build docs image

on:
  # Run manually to test the pipeline or force a fresh image
  workflow_dispatch: {}
  # Build and push a new image on every published GitHub release so the
  # docs image always matches the released version, not every dev commit
  release:
    types:
      - published

permissions:
  contents: read
  packages: write

concurrency:
  group: build-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and push docs image
    runs-on: ubuntu-latest
    env:
      # Docker actions (login, metadata, setup-buildx, build-push) still ship
      # with a Node 20 runtime. Opt into Node 24 now to silence the deprecation
      # warnings and stay ahead of the June 2026 forced migration.
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: '10.33.2'

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '24.15.0'
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync wiki content
        run: pnpm --filter @cfxdevkit/docs-pipeline run docs -- sync all

      - name: Re-index GitNexus
        run: node .gitnexus/run.cjs analyze

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/docs-site
          tags: |
            type=raw,value=edge,enable=${{ github.ref == 'refs/heads/main' }}
            type=raw,value=dev,enable=${{ github.ref == 'refs/heads/dev' }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,format=short

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: repos/cfx-tools/packages/docs-site/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Write image digest artifact
        run: echo '${{ steps.build.outputs.digest }}' > docs-image-digest.txt

      - name: Upload image digest artifact
        uses: actions/upload-artifact@v7
        with:
          name: docs-image-digest
          path: docs-image-digest.txt