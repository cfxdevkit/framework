name: Deploy docs to VPS

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to deploy
        required: false
        default: edge
  workflow_run:
    workflows:
      - Build docs image
    types:
      - completed
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-docs
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy docs site
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1
        env:
          DOCS_IMAGE_TAG: ${{ inputs.image_tag || 'edge' }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          GHCR_USERNAME: ${{ vars.GHCR_USERNAME || 'cfxdevkit' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: deploy
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: DOCS_IMAGE_TAG,GHCR_TOKEN,GHCR_USERNAME
          script_stop: true
          script: |
            set -euo pipefail
            cd /opt/apps/docs
            if [ -n "${GHCR_TOKEN:-}" ]; then
              echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            if [ -n "${DOCS_IMAGE_TAG:-}" ]; then
              sed -i "s#ghcr.io/cfxdevkit/framework/docs-site:.*#ghcr.io/cfxdevkit/framework/docs-site:${DOCS_IMAGE_TAG}#" docker-compose.yml
            fi
            docker compose pull
            docker compose up -d --remove-orphans
            docker image prune -f